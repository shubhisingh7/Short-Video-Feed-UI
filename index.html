<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Short Video Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="feed">

  <!-- VIDEO 1 -->
  <div class="video-card">
    <video autoplay muted loop playsinline>
      <source src="videos/video1.mp4" type="video/mp4">
    </video>

    <div class="heart">❤️</div>

    <div class="comment-box">
      <input type="text" placeholder="Add a comment..." />
      <button>Post</button>
    </div>

    <div class="overlay">
      <span class="sound">🔇</span>

      <div class="info">
        <h3>@user1</h3>
        <p>Awesome video 🔥</p>
      </div>

      <div class="actions">
        <button class="like">🤍</button>
        <button>💬</button>
        <button>🔗</button>
      </div>
    </div>
  </div>

  <!-- VIDEO 2 -->
  <div class="video-card">
    <video autoplay muted loop playsinline>
      <source src="videos/video2.mp4" type="video/mp4">
    </video>

    <div class="heart">❤️</div>

    <div class="comment-box">
      <input type="text" placeholder="Add a comment..." />
      <button>Post</button>
    </div>

    <div class="overlay">
      <span class="sound">🔇</span>

      <div class="info">
        <h3>@user2</h3>
        <p>Enjoy this reel 🎬</p>
      </div>

      <div class="actions">
        <button class="like">🤍</button>
        <button>💬</button>
        <button>🔗</button>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
